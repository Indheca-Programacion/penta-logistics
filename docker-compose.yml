services:
  # Base de Datos: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: penta_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - penta_network
  # Backend: API Node.js
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: penta_api
    restart: always
    depends_on:
      - db
    volumes:
      - ./backend:/app:delegated    # ":delegated" mejora el rendimiento en Linux/Mac
      - /app/node_modules           # Protege los módulos internos
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/penta_db
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true      # Ayuda a que Node detecte cambios de archivos
    ports:
      - "3000:3000"
    networks:
      - penta_network
  # Frontend: PWA servida por Apache
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: penta_web
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - penta_network
    environment:
      - CHOKIDAR_USEPOLLING=true # A veces necesario para el hot reload

# Red interna para que los contenedores se hablen entre sí
networks:
  penta_network:
    driver: bridge